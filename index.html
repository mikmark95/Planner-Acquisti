<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piano Acquisti Uomo</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>Planner Acquisti</h1>
      <nav>
        <button data-tab="dashboard" class="tab-btn active">Dashboard</button>
        <button data-tab="settings" class="tab-btn">Budget & Campagna</button>
        <button data-tab="brands" class="tab-btn">Brand</button>
        <button data-tab="items" class="tab-btn">Articoli</button>
        <button data-tab="history" class="tab-btn">Storico</button>
        <button data-tab="plan" class="tab-btn">Piano acquisti</button>
        <button data-tab="suggestions" class="tab-btn">Suggerimenti</button>
        <button data-tab="backup" class="tab-btn">Import / Export</button>
      </nav>
      <div class="side-actions">
        <button id="toggleTheme">Dark/Light</button>
        <button id="saveBtn">Salva dati</button>
        <button id="resetBtn" class="danger">Reset dati</button>
      </div>
    </aside>

    <main class="content">
      <section id="dashboard" class="tab active"></section>
      <section id="settings" class="tab"></section>
      <section id="brands" class="tab"></section>
      <section id="items" class="tab"></section>
      <section id="history" class="tab"></section>
      <section id="plan" class="tab"></section>
      <section id="suggestions" class="tab"></section>
      <section id="backup" class="tab"></section>
    </main>
  </div>

  <template id="cardTemplate">
    <article class="card">
      <h3></h3>
      <p class="value"></p>
      <small></small>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
