<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piano Acquisti — Buyer Planner</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo-text">Buyer<br>Planner</div>
        <div class="logo-sub">Gestione Acquisti Moda</div>
      </div>

      <div id="sidebarSeason" class="sidebar-season">— Campagna</div>

      <nav>
        <div class="nav-label">Principale</div>
        <button data-tab="dashboard" class="tab-btn active">
          <span class="tab-icon">◈</span> Dashboard
        </button>
        <button data-tab="plan" class="tab-btn">
          <span class="tab-icon">◉</span> Piano Acquisti
        </button>
        <button data-tab="suggestions" class="tab-btn">
          <span class="tab-icon">◇</span> Analisi & Alert
        </button>

        <div class="nav-label">Gestione</div>
        <button data-tab="brands" class="tab-btn">
          <span class="tab-icon">▣</span> Brand
        </button>
        <button data-tab="items" class="tab-btn">
          <span class="tab-icon">▤</span> Articoli
        </button>
        <button data-tab="history" class="tab-btn">
          <span class="tab-icon">◳</span> Storico
        </button>

        <div class="nav-label">Sistema</div>
        <button data-tab="settings" class="tab-btn">
          <span class="tab-icon">◎</span> Budget & Campagna
        </button>
        <button data-tab="backup" class="tab-btn">
          <span class="tab-icon">⊡</span> Import / Export
        </button>
      </nav>

      <div class="side-actions">
        <button id="toggleTheme">⬡ Dark / Light</button>
        <button id="saveBtn">↓ Salva dati</button>
        <button id="resetBtn" class="danger">✕ Reset dati</button>
      </div>
    </aside>

    <!-- ── Content ── -->
    <main class="content">
      <section id="dashboard" class="tab active"></section>
      <section id="settings" class="tab"></section>
      <section id="brands" class="tab"></section>
      <section id="items" class="tab"></section>
      <section id="history" class="tab"></section>
      <section id="plan" class="tab"></section>
      <section id="suggestions" class="tab"></section>
      <section id="backup" class="tab"></section>
    </main>

  </div>
  <script src="app.js"></script>
</body>
</html>
